version: "3.9"

# =====================================================================
# LOCAL DEVELOPMENT — docker compose up
# All services start automatically. Flyway runs migrations from the
# jar classpath (classpath:db/migration). No manual SQL required.
# =====================================================================

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: executionos
      POSTGRES_USER: executionos
      POSTGRES_PASSWORD: executionos
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U executionos"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: dev
      # JDBC URL — entrypoint script also accepts postgres:// format
      DATABASE_URL: jdbc:postgresql://postgres:5432/executionos
      DATABASE_USERNAME: executionos
      DATABASE_PASSWORD: executionos
      JWT_SECRET: change-this-to-a-random-string-of-at-least-32-characters
      CORS_ORIGINS: "http://localhost:3000,http://localhost"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 5

  frontend:
    build:
      context: ../frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
      BACKEND_API_URL: http://backend:8080/api/v1
    depends_on:
      - backend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  # ── Observability (optional — comment out if not needed locally) ───

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana

  loki:
    image: grafana/loki:3.2.1
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro

volumes:
  postgres-data:
  grafana-data:
